name: MLB Fantasy Daily Recap

on:
  schedule:
    # 2 AM ET (EDT = UTC-4, so 6 AM UTC; in EST = UTC-5, runs at 1 AM ET)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  run-recap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: mlb-fantasy-recap-bot/requirements.txt

      - name: Install dependencies
        run: pip install -r mlb-fantasy-recap-bot/requirements.txt

      - name: Run recap bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python mlb-fantasy-recap-bot/daily_fantasy_summary.py
